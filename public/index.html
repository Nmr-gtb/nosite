<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Outil interne de prospection B2B — entreprises de Nice sans site web.">
  <meta name="robots" content="noindex, nofollow">
  <title>Nosite — Prospection Nice</title>

  <!-- Google Fonts : Inter + Instrument Serif (titre) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- Style maison -->
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Overlay de chargement (retiré dès que data.js est lu) -->
  <div id="loader" class="loader">
    <div class="loader-spinner" aria-hidden="true"></div>
    <p class="loader-text">Chargement des entreprises…</p>
  </div>

  <!-- Bandeau d'erreur (titre + message + hint remplis dynamiquement par app.js) -->
  <div id="error-banner" class="error-banner hidden" role="alert">
    <h2 id="error-title">Une erreur est survenue</h2>
    <p id="error-message"></p>
    <p class="error-hint" id="error-hint"></p>
  </div>

  <main class="app hidden" id="app">

    <!-- Carte plein écran à gauche -->
    <section class="map-container" aria-label="Carte des entreprises">
      <div id="map"></div>
    </section>

    <!-- Sidebar 380px à droite -->
    <aside class="sidebar" aria-label="Filtres et liste des prospects">

      <header class="sidebar-header">
        <h1 class="brand-name">Nosite</h1>
        <p class="sidebar-sub">Prospection Nice · <span class="sidebar-sub-num" id="compteur-visible">0</span> / <span class="sidebar-sub-num" id="compteur-total">0</span> entreprises</p>
      </header>

      <div class="sidebar-controls">

        <!-- Recherche -->
        <label class="search">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 14l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="search" id="input-search" placeholder="Rechercher un nom, un sigle…" autocomplete="off" spellcheck="false">
        </label>

        <!-- Filtres classification -->
        <fieldset class="filter-group">
          <legend>Classification</legend>
          <div class="radio-row" id="filter-classification">
            <!-- rempli par JS -->
          </div>
        </fieldset>

        <!-- Filtres NAF -->
        <fieldset class="filter-group">
          <legend>Codes NAF</legend>
          <div class="checkbox-col" id="filter-naf">
            <!-- rempli par JS -->
          </div>
        </fieldset>

        <!-- Toggles -->
        <label class="toggle">
          <input type="checkbox" id="toggle-hide-contacted">
          <span class="toggle-label">Masquer les contactées</span>
        </label>

        <button class="btn-export" id="btn-export-csv" type="button">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 3v9m0 0l-3-3m3 3l3-3M5 15h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Exporter CSV
        </button>
      </div>

      <!-- Liste scrollable -->
      <ol class="list" id="list" aria-live="polite"></ol>

    </aside>

    <!-- Panneau de fiche détaillée (glisse depuis la droite) -->
    <section class="detail-panel" id="detail-panel" aria-label="Fiche détaillée" aria-hidden="true">
      <div class="detail-scroll" id="detail-content">
        <!-- rempli par JS à chaque ouverture -->
      </div>
    </section>

    <!-- Voile assombrissant derrière le panneau -->
    <div class="detail-backdrop" id="detail-backdrop" aria-hidden="true"></div>

  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Configuration locale (URL du Gist privé) -->
  <script src="./config.js"></script>

  <!-- App -->
  <script src="./app.js"></script>
</body>
</html>
